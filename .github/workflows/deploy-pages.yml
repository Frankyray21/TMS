name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Versionner le cache automatiquement (hash du commit)
        run: |
          VER="tms-${GITHUB_SHA::7}"
          sed -i "s|const VERSION = \"[^\"]*\";|const VERSION = \"$VER\";|" sw.js
          echo "Cache du service worker versionné : $VER"
          grep -n 'const VERSION' sw.js

      - name: Préparer le dossier de publication (exclut les fichiers de développement)
        run: |
          rsync -a --delete \
            --exclude='.git' --exclude='.github' --exclude='.claude' \
            --exclude='worker' \
            --exclude='PLANNING_7_niveaux.md' \
            --exclude='formation-guidee-design.html' --exclude='support.js' \
            --exclude='corps-3d.html' --exclude='models/mannequin.glb' \
            --exclude='netlify.toml' --exclude='vercel.json' \
            ./ _site/
          echo "Contenu publié :" && du -sh _site

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Téléverser le site statique
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Déployer
        id: deployment
        uses: actions/deploy-pages@v4
